server:
  port: 8082

spring:
  application:
    name: redaction-review-service
  # Relational audit/reporting datasource (Postgres). The SearchRepository
  # queries the `foiaRequests` table here. Defaults target the local
  # docker-compose postgres:16 (DB foia_response_pipeline / user app).
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foia_response_pipeline}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app_dev_password}
  # Run schema.sql + data.sql against the datasource on startup so the
  # foiaRequests table exists for the (deliberately vulnerable) search query.
  sql:
    init:
      mode: always
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://app:app_dev_password@localhost:27017}
      database: ${MONGO_DB:foia_response_pipeline}
      auto-index-creation: true

foia_request:
  service:
    url: ${FOIA_REQUEST_SERVICE_URL:http://foia-request-service:8081}

ai:
  orchestrator:
    url: ${AI_ORCHESTRATOR_URL:http://ai-orchestrator:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  # ⚠ DELIBERATE — Item 6: redaction-review-service uses traceId.
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"
  level:
    com.karsunfde.foiapipeline: INFO
