# foia-response-pipeline — local dev orchestration
#
# ⚠ DELIBERATE BROWNFIELD DEBT (cross-references docs/brownfield-debt.md):
#   - postgres data volume NOT mounted (data lost on restart) — Item 11 reinforcement
#   - no healthchecks on any service — Item 11 reinforcement
#   - service images use :latest (Item 11)
#
# Bring up the full stack:
#   docker-compose -f infra/docker/docker-compose.yml up --build
#
# Endpoints once up:
#   http://localhost:8080         — api-gateway
#   http://localhost:8081         — foia-request-service (direct)
#   http://localhost:8082         — redaction-review-service (direct)
#   http://localhost:8000         — ai-orchestrator
#   http://localhost:4200         — Angular SPA
#   localhost:5432                — postgres
#   localhost:27017               — mongodb

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: foia_response_pipeline
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev_password
    ports:
      - "5432:5432"
    # ⚠ DELIBERATE: no volume mount. Restart = data loss.
    # Cohort fixes in W1 Tue inventory follow-up.

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: app
      MONGO_INITDB_ROOT_PASSWORD: app_dev_password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db   # ← inconsistency vs postgres — teaching moment

  api-gateway:
    build:
      context: ../../services/api-gateway
    image: foia-response-pipeline/api-gateway:latest   # ⚠ Item 11
    ports:
      - "8080:8080"
    environment:
      JWT_ISSUER_URI: http://localhost:8090/auth
      FOIA_REQUEST_SERVICE_URL: http://foia-request-service:8081
      REDACTION_REVIEW_SERVICE_URL: http://redaction-review-service:8082
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
    depends_on:
      - foia-request-service
      - redaction-review-service
      - ai-orchestrator
    # ⚠ no healthcheck

  foia-request-service:
    build:
      context: ../../services/foia-request-service
    image: foia-response-pipeline/foia-request-service:latest   # ⚠ Item 11
    ports:
      - "8081:8081"
    environment:
      MONGO_URL: mongodb://app:app_dev_password@mongodb:27017
      MONGO_DB: foia_response_pipeline
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      JWT_ISSUER_URI: http://localhost:8090/auth
    depends_on:
      - mongodb
      - ai-orchestrator
    # ⚠ no healthcheck

  redaction-review-service:
    build:
      context: ../../services/redaction-review-service
    image: foia-response-pipeline/redaction-review-service:latest   # ⚠ Item 11
    ports:
      - "8082:8082"
    environment:
      FOIA_REQUEST_SERVICE_URL: http://foia-request-service:8081
      # Relational audit/reporting datasource (Postgres) — backs the
      # SearchRepository `foiaRequests` query. Without it the service fails
      # to boot ("Failed to determine a suitable driver class").
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/foia_response_pipeline
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app_dev_password
      # Mongo document store for RedactionReview (@Document). Other services
      # set this; it was missing here and defaulted to localhost:27017.
      MONGO_URL: mongodb://app:app_dev_password@mongodb:27017
      MONGO_DB: foia_response_pipeline
      # ⚠ DELIBERATE: redaction-review-service calls foia-request-service directly,
      #   not through the gateway — tighter coupling than necessary, and the
      #   call has no circuit breaker (Item 3).
    depends_on:
      - foia-request-service
      - postgres
      - mongodb
    # ⚠ no healthcheck

  ai-orchestrator:
    build:
      context: ../../services/ai-orchestrator
    image: foia-response-pipeline/ai-orchestrator:latest   # ⚠ Item 11
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: us-east-1
      BEDROCK_MODEL_ID: anthropic.claude-3-7-sonnet-20250219-v1:0
      MONGO_URL: mongodb://app:app_dev_password@mongodb:27017
    # ⚠ DELIBERATE: no AWS creds wired — relies on shared dev IAM role being
    #   mounted via ~/.aws/credentials. The Bedrock stub returns mock data
    #   so it works without real creds. First-day learners discover this and
    #   learn to run `aws configure sso`.
    # ⚠ no healthcheck

  frontend:
    build:
      context: ../../frontend
    image: foia-response-pipeline/frontend:latest   # ⚠ Item 11
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    # ⚠ no healthcheck

volumes:
  mongo-data:
